<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="35%" stop-color="#38bdf8"/>
      <stop offset="70%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="nameStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="4" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="220" rx="24" fill="transparent"/>

  <text x="450" y="118" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="72"
        font-weight="900"
        letter-spacing="2"
        filter="url(#shadow)"
        fill="#0f172a">Alice Golakiya</text>

  <text x="450" y="118" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="72"
        font-weight="900"
        letter-spacing="2"
        stroke="url(#nameStroke)"
        stroke-width="2"
        fill="url(#nameGlow)"
        filter="url(#glow)">Alice Golakiya</text>

  <text x="450" y="156" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="20"
        font-weight="700"
        letter-spacing="6"
        fill="#64748b">DEVSECOPS | CLOUD | AUTOMATION</text>
</svg>
